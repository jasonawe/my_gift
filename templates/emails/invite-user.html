<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邀请您加入礼簿管家</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f8fafc; margin: 0; padding: 0; color: #334155; }
    .container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
    .header { background-color: #b22222; padding: 32px 24px; text-align: center; }
    .header h1 { color: #ffffff; margin: 0; font-size: 24px; font-weight: 700; letter-spacing: 2px; }
    .header p { color: #fecaca; margin: 8px 0 0 0; font-size: 14px; text-transform: uppercase; letter-spacing: 4px; }
    .content { padding: 40px 32px; text-align: center; }
    .content h2 { color: #0f172a; font-size: 20px; margin-top: 0; margin-bottom: 16px; font-weight: 600; }
    .content p { font-size: 16px; line-height: 1.6; color: #475569; margin-bottom: 32px; }
    .button { display: inline-block; background-color: #b22222; color: #ffffff !important; font-weight: 600; font-size: 16px; text-decoration: none; padding: 16px 32px; border-radius: 8px; transition: background-color 0.2s; }
    .button:hover { background-color: #991b1b; }
    .fallback { margin-top: 32px; font-size: 14px; color: #64748b; padding-top: 24px; border-top: 1px solid #e2e8f0; word-break: break-all; text-align: left; }
    .fallback a { color: #b22222; text-decoration: underline; }
    .footer { background-color: #f1f5f9; padding: 24px; text-align: center; font-size: 12px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>礼簿管家</h1>
      <p>Smart Archive</p>
    </div>
    <div class="content">
      <h2>您收到了一份邀请！</h2>
      <p>有人邀请您加入礼簿管家。与他们一起共同管理和记录您的电子人情账本，让心意有迹可循。</p>
      
      <a href="{{ .ConfirmationURL }}" class="button">接受邀请并加入</a>
      
      <div class="fallback">
        如果按钮无法点击，请复制并访问以下链接：<br>
        <a href="{{ .ConfirmationURL }}">{{ .ConfirmationURL }}</a>
      </div>
    </div>
    <div class="footer">
      <p>如果您不认识邀请人，或者不想加入，请安全地忽略此邮件。</p>
      <p>&copy; 2026 礼簿管家. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
